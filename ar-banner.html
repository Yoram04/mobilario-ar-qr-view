<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Especificaciones - MMC AR</title>
<link rel="icon" type="image/png" href="./logo-mmc.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #FF8C3C;
    --primary-glow: rgba(255,140,60,0.15);
    --bg: rgba(255, 255, 255, 0.85);
    --border: rgba(0, 0, 0, 0.08);
    --text: #1D1D1F;
    --text-muted: #6E6E73;
    --radius: 20px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    background: var(--bg);
    backdrop-filter: blur(20px) saturate(190%);
    -webkit-backdrop-filter: blur(20px) saturate(190%);
    padding: 20px 24px;
    height: 100vh;
    overflow-y: auto;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    position: relative;
  }
  .logo-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 50px;
    height: 32px;
  }
  .logo-glow {
    position: absolute;
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, rgba(255, 140, 60, 0.25) 0%, rgba(255, 140, 60, 0) 70%);
    pointer-events: none;
    z-index: 1;
  }
  .logo-img {
    height: 22px;
    object-fit: contain;
    position: relative;
    z-index: 2;
  }
  .badge {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* Product Info */
  .title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .brand {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    display: block;
  }
  .desc {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  /* Dimensions pill row */
  .dims-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .dim-pill {
    flex: 1;
    background: rgba(0,0,0,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }
  .dim-pill .dim-val {
    font-size: 13px;
    font-weight: 800;
    color: var(--text);
    display: block;
  }
  .dim-pill .dim-lbl {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Specs Grid */
  .specs-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(0, 0, 0, 0.03);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .spec-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    line-height: 1.4;
  }
  .spec-key {
    font-weight: 600;
    color: var(--text-muted);
  }
  .spec-val {
    font-weight: 500;
    color: var(--text);
    text-align: right;
    max-width: 60%;
  }

  /* CAD Downloads */
  .cad-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .downloads {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .btn-cad {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-cad:active {
    background: rgba(255, 255, 255, 0.9);
  }
  .btn-cad svg {
    stroke: var(--primary);
  }

  /* WhatsApp CTA */
  .btn-wa {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px;
    background: #25D366;
    border-radius: 16px;
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    text-decoration: none;
    margin-bottom: 16px;
    letter-spacing: 0.2px;
  }
  .btn-wa:active {
    background: #1ebe5a;
  }
</style>
</head>
<body>

  <div class="header">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <img src="./logo-mmc.png" alt="MMC" class="logo-img">
    </div>
    <span class="badge">Detalle AR</span>
  </div>

  <h1 class="title" id="title">Cargando Mueble...</h1>
  <span class="brand" id="brand">MMC</span>
  <p class="desc" id="desc">Especificaciones técnicas y descargas CAD del producto.</p>

  <div class="dims-row" id="dims-row" style="display:none">
    <div class="dim-pill"><span class="dim-val" id="dim-w">—</span><span class="dim-lbl">Ancho</span></div>
    <div class="dim-pill"><span class="dim-val" id="dim-h">—</span><span class="dim-lbl">Alto</span></div>
    <div class="dim-pill"><span class="dim-val" id="dim-d">—</span><span class="dim-lbl">Fondo</span></div>
  </div>

  <div class="specs-list" id="specs">
    <!-- Rellenado dinámicamente o por URL Hash -->
  </div>

  <a class="btn-wa" id="btn-wa" href="#" target="_blank">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Solicitar Cotización
  </a>

  <div class="cad-title">Recursos CAD</div>
  <div class="downloads">
    <a class="btn-cad" id="link-dwg" href="#" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      .DWG
    </a>
    <a class="btn-cad" id="link-skp" href="#" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      .SKP
    </a>
  </div>

  <script>
    // Recuperar datos del producto a partir de los parámetros de búsqueda o hash
    function init() {
      const params = new URLSearchParams(window.location.hash.substring(1) || window.location.search);
      
      const title = params.get('title') || 'Paso Gato Industrial';
      const brand = params.get('brand') || 'QR001 · Activo';
      const desc = params.get('desc') || '';
      
      document.getElementById('title').textContent = title;
      document.getElementById('brand').textContent = brand;
      if (desc) document.getElementById('desc').textContent = desc;

      // Dimensiones
      const dimW = params.get('dimW');
      const dimH = params.get('dimH');
      const dimD = params.get('dimD');
      if (dimW || dimH || dimD) {
        document.getElementById('dims-row').style.display = 'flex';
        if (dimW) document.getElementById('dim-w').textContent = dimW + ' m';
        if (dimH) document.getElementById('dim-h').textContent = dimH + ' m';
        if (dimD) document.getElementById('dim-d').textContent = dimD + ' m';
      }

      // Botón WhatsApp
      const waText = encodeURIComponent(`Hola, me interesa: ${title}`);
      document.getElementById('btn-wa').href = `https://wa.me/526633191962?text=${waText}`;

      // Cargar links CAD
      const dwg = params.get('dwg');
      const skp = params.get('skp');
      const dwgBtn = document.getElementById('link-dwg');
      const skpBtn = document.getElementById('link-skp');

      if (dwg && dwg !== '#') {
        dwgBtn.href = dwg;
      } else {
        dwgBtn.style.opacity = '0.4';
        dwgBtn.style.pointerEvents = 'none';
      }

      if (skp && skp !== '#') {
        skpBtn.href = skp;
      } else {
        skpBtn.style.opacity = '0.4';
        skpBtn.style.pointerEvents = 'none';
      }

      // Generar specs
      const specsContainer = document.getElementById('specs');
      const specPairs = [];
      params.forEach((value, key) => {
        if (!['title', 'brand', 'desc', 'dwg', 'skp', 'custom', 'customHeight', 'dimW', 'dimH', 'dimD'].includes(key)) {
          specPairs.push([key, value]);
        }
      });

      if (specPairs.length > 0) {
        specsContainer.style.display = 'flex';
        specPairs.forEach(([key, val]) => {
          const row = document.createElement('div');
          row.className = 'spec-row';
          row.innerHTML = `<span class="spec-key">${key.charAt(0).toUpperCase() + key.slice(1)}</span><span class="spec-val">${val}</span>`;
          specsContainer.appendChild(row);
        });
      } else {
        // Fallback specs si no hay params
        specsContainer.innerHTML = `
          <div class="spec-row"><span class="spec-key">Estructura</span><span class="spec-val">Acero estructural</span></div>
          <div class="spec-row"><span class="spec-key">Dimensiones</span><span class="spec-val">Cotas de fabricante</span></div>
        `;
      }
    }

    window.addEventListener('load', init);
    window.addEventListener('hashchange', init);
  </script>
</body>
</html>
