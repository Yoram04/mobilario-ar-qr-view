<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOBILARIO AR QR VIEW by MMC</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fff;color:#1a1a1a}
.header{background:linear-gradient(135deg,#f8f8f8,#fff);border-bottom:1px solid rgba(0,0,0,.08);padding:28px 24px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.logo{width:56px;height:56px;margin:0 auto 16px;background:linear-gradient(135deg,#0099cc,#0066aa);border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:#fff}
h1{font-size:32px;font-weight:700}
.sub{font-size:14px;color:#666}
.content{padding:24px;max-width:900px;margin:0 auto}
h2{font-size:24px;font-weight:700;margin-bottom:24px}
.card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card h3{font-size:18px;font-weight:600;margin-bottom:8px}
.card p{font-size:14px;color:#666;margin-bottom:14px}
.viewer-container{width:100%;height:400px;border-radius:12px;overflow:hidden;margin-bottom:16px;background:#f5f5f5}
model-viewer{width:100%;height:100%;background:#f5f5f5}
.dims{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.dim{background:#f0f4ff;padding:14px;border-radius:10px;text-align:center}
.dim label{font-size:10px;color:#666;font-weight:600;text-transform:uppercase;display:block;margin-bottom:4px}
.dim span{font-size:20px;font-weight:700;color:#0066aa}
.ar-btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#0099cc,#0066aa);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.badge{display:inline-block;font-size:11px;background:#f0f4ff;padding:4px 10px;border-radius:6px;color:#0066aa;font-weight:600;margin-bottom:8px}
</style>
</head>
<body>

<div class="header">
<div class="logo">MMC</div>
<h1>MOBILARIO AR</h1>
<p class="sub">QR VIEW by MMC</p>
</div>

<div class="content">
<h2>Catálogo</h2>

<div class="card">
<div class="badge">QR001</div>
<h3>Paso Gato</h3>
<p>Estructura de herrería con barandales</p>
<div class="viewer-container">
<model-viewer id="m1" src="./paso-gato.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral"></model-viewer>
</div>
<div class="dims">
<div class="dim"><label>Ancho</label><span>3.0m</span></div>
<div class="dim"><label>Alto</label><span>1.2m</span></div>
<div class="dim"><label>Profundidad</label><span>1.1m</span></div>
</div>
<button class="ar-btn" onclick="document.getElementById('m1').activateAR()">📱 Ver en tu espacio (AR)</button>
</div>

<div class="card">
<div class="badge">QR002</div>
<h3>Silla</h3>
<p>Silla de herrería</p>
<div class="viewer-container">
<model-viewer id="m2" src="./silla.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral"></model-viewer>
</div>
<div class="dims">
<div class="dim"><label>Ancho</label><span>0.60m</span></div>
<div class="dim"><label>Alto</label><span>1.25m</span></div>
<div class="dim"><label>Profundidad</label><span>0.50m</span></div>
</div>
<button class="ar-btn" onclick="document.getElementById('m2').activateAR()">📱 Ver en tu espacio (AR)</button>
</div>

<div class="card">
<div class="badge">QR003 PRUEBA</div>
<h3>Astronauta</h3>
<p>Modelo de prueba</p>
<div class="viewer-container">
<model-viewer id="m3" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral"
