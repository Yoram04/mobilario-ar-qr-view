<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AR View - MMC</title>
<link rel="icon" type="image/png" href="./logo-mmc.png">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #FF8C3C;
    --primary-glow: rgba(255,140,60,0.28);
    --primary-dim: rgba(255,140,60,0.12);
    --dark-bg: #08080A;
    --dark-surface: rgba(255,255,255,0.055);
    --dark-surface-hover: rgba(255,255,255,0.1);
    --dark-border: rgba(255,255,255,0.09);
    --dark-text: #FFFFFF;
    --dark-muted: #A1A1A6;
    --light-bg: #F4F4F7;
    --glass-white: rgba(255,255,255,0.52);
    --glass-border: rgba(255,255,255,0.45);
    --glass-blur: blur(24px) saturate(180%);
    --glass-blur-sm: blur(12px) saturate(160%);
    --text: #1D1D1F;
    --text-muted: #6E6E73;
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 14px;
    --spring: cubic-bezier(0.34,1.56,0.64,1);
    --smooth: cubic-bezier(0.16,1,0.3,1);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--light-bg);
    height: 100dvh;
    width: 100vw;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .screen-container { position:relative; width:100%; height:100%; }

  .screen {
    position: absolute;
    inset: 0;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.45s var(--smooth), visibility 0.45s, transform 0.45s var(--smooth);
    overflow: hidden;
  }

  .screen.active { opacity:1; visibility:visible; transform:none !important; }

  #catalog-screen {
    transform: scale(1.02);
    background: var(--light-bg);
    display: flex;
    flex-direction: column;
  }

  #viewer-screen {
    transform: translateY(24px);
    background: var(--light-bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,140,60,0.05) 0%, transparent 50%),
      radial-gradient(circle at 85% 90%, rgba(91,134,229,0.06) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
  }

  /* ── CATALOG BG ANIMATED ORBS ── */
  .catalog-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .catalog-bg::before {
    content:'';
    position:absolute;
    top:-20%; left:-20%;
    width:70vw; height:70vw;
    background: radial-gradient(circle, rgba(255,140,60,0.16) 0%, transparent 65%);
    border-radius:50%;
    animation: driftA 20s ease-in-out infinite alternate;
  }
  .catalog-bg::after {
    content:'';
    position:absolute;
    bottom:-15%; right:-15%;
    width:65vw; height:65vw;
    background: radial-gradient(circle, rgba(91,134,229,0.13) 0%, transparent 65%);
    border-radius:50%;
    animation: driftB 26s ease-in-out infinite alternate;
  }
  @keyframes driftA { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(60px,40px) scale(1.15)} }
  @keyframes driftB { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(-50px,-30px) scale(1.1)} }

  /* ── CATALOG CONTENT ── */
  .catalog-content {
    position: relative;
    z-index: 1;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 0 20px calc(36px + env(safe-area-inset-bottom,0px)) 20px;
  }
  .catalog-content::-webkit-scrollbar { display:none; }

  /* ── TOPBAR ── */
  .catalog-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: calc(env(safe-area-inset-top,16px) + 22px) 0 0 0;
    margin-bottom: 32px;
    flex-shrink: 0;
  }
  .catalog-topbar-logo-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 36px;
    margin-left: -12px;
  }
  .catalog-topbar-logo-glow {
    position: absolute;
    width: 64px;
    height: 64px;
    background: radial-gradient(circle, rgba(255, 140, 60, 0.28) 0%, rgba(255, 140, 60, 0) 70%);
    pointer-events: none;
    z-index: 1;
  }
  .catalog-topbar-logo {
    height: 28px;
    object-fit: contain;
    position: relative;
    z-index: 2;
    opacity: 0.95;
  }
  .catalog-topbar-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ── HERO ── */
  .catalog-hero { margin-bottom: 28px; }

  .catalog-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--primary);
    background: var(--primary-dim);
    border: 1px solid rgba(255,140,60,0.18);
    padding: 5px 13px;
    border-radius: 30px;
    margin-bottom: 16px;
  }
  .catalog-eyebrow::before {
    content:'';
    width:6px; height:6px;
    border-radius:50%;
    background: var(--primary);
    box-shadow: 0 0 8px var(--primary);
    animation: orbPulse 2s ease-in-out infinite;
  }
  @keyframes orbPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.55;transform:scale(0.8)} }

  .catalog-hero h1 {
    font-size: clamp(34px, 7.5vw, 46px);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -1.5px;
    color: var(--text);
    margin-bottom: 12px;
  }
  .catalog-hero h1 .title-brand {
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: -1.0px;
    white-space: nowrap;
  }
  .catalog-hero h1 .title-brand-highlight {
    font-weight: 800;
    color: var(--primary);
  }

  .catalog-hero p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    font-weight: 400;
    max-width: 340px;
  }

  /* ── CATALOG GRID ── */
  .catalog-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 600px) { .catalog-grid { grid-template-columns: repeat(2,1fr); } }
  @media (min-width: 960px) { .catalog-grid { grid-template-columns: repeat(3,1fr); } }

  /* ── CARD ── */
  .catalog-card {
    position: relative;
    background: rgba(255, 255, 255, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.45);
    border-radius: var(--radius-xl);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    cursor: pointer;
    overflow: hidden;
    transition: background 0.35s var(--smooth), border-color 0.35s var(--smooth),
                transform 0.4s var(--spring), box-shadow 0.4s var(--smooth);
    animation: cardUp 0.6s var(--smooth) both;
    backdrop-filter: var(--glass-blur-sm);
    -webkit-backdrop-filter: var(--glass-blur-sm);
  }
  .catalog-card::before {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.045) 0%, transparent 55%);
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.35s ease;
    pointer-events: none;
  }

  @keyframes cardUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .catalog-card:nth-child(1){animation-delay:0ms}
  .catalog-card:nth-child(2){animation-delay:70ms}
  .catalog-card:nth-child(3){animation-delay:140ms}
  .catalog-card:nth-child(4){animation-delay:210ms}
  .catalog-card:nth-child(5){animation-delay:280ms}

  .catalog-card:hover {
    background: rgba(255, 255, 255, 0.82);
    border-color: rgba(255,140,60,0.38);
    transform: translateY(-5px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.06), 0 0 0 1px rgba(255,140,60,0.08), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .catalog-card:hover::before { opacity:1; }
  .catalog-card:active { transform:scale(0.97)!important; transition:transform 0.12s ease!important; }

  .catalog-card-image {
    height: 190px;
    background: linear-gradient(145deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.4) 100%);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.85);
    overflow: hidden;
    position: relative;
    transition: all 0.35s var(--smooth);
  }
  .catalog-card:hover .catalog-card-image {
    background: linear-gradient(145deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.65) 100%);
    border-color: rgba(255,140,60,0.15);
  }
  .catalog-card-image svg {
    width: 68px; height: 68px;
    stroke: var(--text);
    transition: transform 0.4s var(--spring), stroke 0.3s ease;
  }
  .catalog-card:hover .catalog-card-image svg {
    transform: scale(1.14) translateY(-2px);
    stroke: rgba(255,255,255,0.95);
  }
  .catalog-card-image img {
    width:100%; height:100%;
    object-fit: contain;
    padding: 4px;
    transition: transform 0.4s var(--spring);
  }
  .catalog-card:hover .catalog-card-image img { transform:scale(1.1); }

  .catalog-card-badge {
    position: absolute;
    top: 10px; right: 10px;
    font-size: 9px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--primary);
    background: var(--primary-dim);
    border: 1px solid rgba(255,140,60,0.22);
    padding: 4px 10px;
    border-radius: 20px;
    z-index: 2;
  }

  .catalog-card-info { display:flex; flex-direction:column; gap:5px; }

  .catalog-card-title {
    font-size: 17px; font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1.2;
  }
  .catalog-card-desc {
    font-size: 12px; color: var(--text-muted);
    line-height: 1.5; font-weight: 400;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    height: 36px;
  }

  .catalog-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(0,0,0,0.05);
    padding-top: 12px;
    margin-top: auto;
  }
  .catalog-card-dims {
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
  }
  .catalog-card-btn {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 800;
    color: var(--primary);
    background: none; border: none; cursor: pointer;
  }
  .catalog-card-btn svg {
    width:13px; height:13px;
    stroke: currentColor;
    transition: transform 0.3s var(--spring);
  }
  .catalog-card:hover .catalog-card-btn svg { transform:translateX(4px); }

  /* ── VIEWER: FLOATING ── */
  .back-btn-floating {
    position: absolute;
    top: calc(12px + env(safe-area-inset-top,20px));
    left: 16px;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--glass-white);
    backdrop-filter: var(--glass-blur-sm);
    -webkit-backdrop-filter: var(--glass-blur-sm);
    border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text); cursor: pointer;
    transition: all 0.3s var(--spring);
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    z-index: 15;
  }
  .back-btn-floating:hover  { background:rgba(255,255,255,0.85); transform:scale(1.08); }
  .back-btn-floating:active { transform:scale(0.92)!important; transition:transform 0.1s ease!important; }
  .back-btn-floating svg { width:18px; height:18px; }

  .logo-floating {
    position: absolute;
    top: calc(12px + env(safe-area-inset-top,20px));
    right: 16px;
    height: 42px; padding: 6px 14px;
    border-radius: 24px;
    background: var(--glass-white);
    backdrop-filter: var(--glass-blur-sm);
    -webkit-backdrop-filter: var(--glass-blur-sm);
    border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    z-index: 15;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }
  .logo-floating img { height:24px; object-fit:contain; }

  .view-toggle {
    position: absolute;
    top: calc(64px + env(safe-area-inset-top,20px));
    left: 16px;
    background: var(--glass-white);
    backdrop-filter: var(--glass-blur-sm);
    -webkit-backdrop-filter: var(--glass-blur-sm);
    border: 1px solid var(--glass-border);
    border-radius: 30px; padding: 3px;
    display: flex; gap: 2px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    z-index: 5;
  }
  .view-toggle-btn {
    border:none; background:none;
    padding: 6px 13px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    transition: all 0.25s var(--smooth);
  }
  .view-toggle-btn.active {
    background: rgba(255,255,255,0.88);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .ar-badge-dot {
    width:7px; height:7px;
    background:#34C759; border-radius:50%;
    display:inline-block;
    box-shadow: 0 0 0 2px rgba(52,199,89,0.25);
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%,100%{box-shadow:0 0 0 0 rgba(52,199,89,0.4)}
    60%{box-shadow:0 0 0 5px rgba(52,199,89,0)}
  }

  .cota-toggle {
    position: absolute;
    top: calc(64px + env(safe-area-inset-top,20px));
    right: 16px;
    background: var(--glass-white);
    backdrop-filter: var(--glass-blur-sm);
    -webkit-backdrop-filter: var(--glass-blur-sm);
    border: 1px solid var(--glass-border);
    padding: 8px 15px; border-radius: 30px;
    font-size: 11px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    display: flex; align-items: center; gap: 6px;
    transition: all 0.3s var(--smooth);
    z-index: 5; color: var(--text);
  }
  .cota-toggle:hover  { background:rgba(255,255,255,0.8); transform:translateY(-1px); }
  .cota-toggle:active { transform:scale(0.95)!important; transition:transform 0.1s ease!important; }
  .cota-toggle.active {
    background: var(--primary-dim);
    color: var(--primary);
    border-color: rgba(255,140,60,0.45);
    box-shadow: 0 4px 20px rgba(255,140,60,0.14);
  }

  /* ── VIEWER SECTION ── */
  .viewer-section {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }
  model-viewer {
    width:100%; height:100%;
    display:block;
    --poster-color:transparent;
  }

  /* ── HOTSPOTS — estilo Amazon ── */
  .hotspot {
    background: rgba(255,255,255,0.97);
    color: #1a1a1a;
    border-radius: 100px;
    padding: 7px 14px;
    font-size: 13px; font-weight: 700;
    white-space: nowrap; pointer-events: none;
    box-shadow: 0 2px 14px rgba(0,0,0,0.20), 0 0 0 1px rgba(0,0,0,0.07);
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 5px;
    font-family: 'Inter', sans-serif;
    transform: translate(-50%,-50%);
  }
  .hotspot-icon { font-size:10px; color:var(--primary); font-weight:900; }
  .hotspot-label { opacity:0.45; font-size:11px; font-weight:600; }
  .hotspot-val { font-weight:800; font-size:13px; }

  .corner-dot {
    width: 10px; height: 10px;
    background: var(--primary);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 0 2.5px rgba(255,255,255,0.95), 0 2px 8px rgba(0,0,0,0.28);
  }

  #bbox-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 4;
  }

  model-viewer:not(.show-cotas) [slot^="hotspot"],
  model-viewer:not(.show-cotas) [slot^="corner"] { display:none!important; }

  /* ── PROGRESS / ERROR ── */
  #model-progress {
    position:absolute; bottom:0; left:0; right:0;
    height:3px; background:rgba(0,0,0,0.05);
  }
  #progress-fill {
    height:100%; background:var(--primary);
    width:0%; transition:width 0.2s ease-out;
    box-shadow:0 0 8px var(--primary);
  }
  #model-error {
    background:rgba(255,255,255,0.88);
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border-radius:var(--radius-lg);
    margin:20px; border:1px solid rgba(255,255,255,0.6);
    box-shadow:0 8px 32px rgba(0,0,0,0.08);
  }

  /* ── PHOTO VIEW ── */
  .photo-view-container {
    width:100%; height:100%;
    display:none; align-items:center; justify-content:center;
    padding:24px; position:absolute; inset:0; z-index:1;
  }
  .photo-view-img {
    max-width:100%; max-height:80%;
    object-fit:contain;
    border-radius:var(--radius-xl);
    box-shadow:0 20px 60px rgba(0,0,0,0.12);
    background:rgba(255,255,255,0.7);
    border:1px solid rgba(255,255,255,0.8);
    padding:16px;
  }

  /* ── PRODUCT SHEET ── */
  .product-sheet {
    background: var(--glass-white);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-top-left-radius: 36px;
    border-top-right-radius: 36px;
    border-top: 1.5px solid rgba(255,255,255,0.55);
    border-left: 1px solid rgba(255,255,255,0.3);
    border-right: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 -16px 60px rgba(0,0,0,0.06);
    padding: 14px 22px 0 22px;
    position: relative; z-index: 20;
    margin-top: -36px;
    display: flex; flex-direction: column;
    max-height: 52vh;
    padding-bottom: calc(16px + env(safe-area-inset-bottom,0px));
  }
  .sheet-handle {
    width:40px; height:4px;
    background:rgba(0,0,0,0.1); border-radius:2px;
    margin:0 auto 14px;
  }
  .product-sheet-header-pinned {
    flex-shrink:0;
    padding-bottom:14px;
    border-bottom:1px solid rgba(0,0,0,0.05);
    margin-bottom:14px;
  }
  .product-scrollable {
    overflow-y:auto; flex:1; padding-bottom:24px; scrollbar-width:none;
  }
  .product-scrollable::-webkit-scrollbar { display:none; }

  .product-header {
    display:flex; justify-content:space-between;
    align-items:flex-start; margin-bottom:12px; gap:12px;
  }
  .product-title {
    font-size:24px; font-weight:900;
    letter-spacing:-0.8px; line-height:1.1; color:var(--text);
  }
  .product-brand {
    display:inline-flex; align-items:center;
    font-size:10px; color:var(--text-muted); font-weight:700;
    background:rgba(0,0,0,0.04); padding:5px 11px; border-radius:20px;
    text-transform:uppercase; letter-spacing:0.8px; white-space:nowrap;
    border:1px solid var(--border);
  }
  .product-desc {
    font-size:13px; color:var(--text-muted);
    line-height:1.65; margin-bottom:18px; font-weight:400;
  }

  /* ── DIMENSIONS ── */
  .dimensions-grid {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:8px; margin-bottom:18px;
  }
  .dim-item {
    text-align:center;
    background:rgba(255,255,255,0.5);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    padding:12px 4px; border-radius:16px;
    border:1px solid rgba(255,255,255,0.6);
    box-shadow:0 2px 8px rgba(0,0,0,0.02);
    transition: all 0.3s var(--spring);
  }
  .dim-item:hover { transform:translateY(-2px) scale(1.03); background:rgba(255,255,255,0.8); }
  .dim-label {
    font-size:9px; color:var(--text-muted);
    margin-bottom:4px; text-transform:uppercase;
    letter-spacing:0.8px; font-weight:700;
  }
  .dim-val { font-size:14px; font-weight:800; color:var(--text); letter-spacing:-0.3px; }

  /* ── AR BUTTON ── */
  .btn-ar {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%;
    background: var(--primary);
    color: #FFFFFF;
    border:none; padding:15px; border-radius:var(--radius-lg);
    font-size:15px; font-weight:700; cursor:pointer;
    transition: all 0.3s var(--spring);
    box-shadow: 0 8px 28px var(--primary-glow), 0 2px 8px rgba(255,140,60,0.18);
    letter-spacing:0.2px;
  }
  .btn-ar:hover {
    background:#FF9F56;
    transform:translateY(-2px);
    box-shadow:0 14px 40px var(--primary-glow), 0 4px 12px rgba(255,140,60,0.22);
  }

    function placeHotspots(d, c) {
      viewer.querySelectorAll('[slot^="hotspot-"],[slot^="corner-"]').forEach(el => el.remove());
      const fmt = v => v >= 1 ? v.toFixed(2) + ' m' : Math.round(v * 100) + ' cm';
      const labels = [
        { pos:`${c.x+d.x*0.52} ${c.y} ${c.z}`,          norm:'1 0 0', icon:'↔', label:'Ancho', val:fmt(d.x) },
        { pos:`${c.x} ${c.y+d.y*0.52} ${c.z}`,           norm:'0 1 0', icon:'↕', label:'Alto',  val:fmt(d.y) },
        { pos:`${c.x} ${c.y-d.y*0.25} ${c.z+d.z*0.52}`,  norm:'0 0 1', icon:'⤢', label:'Fondo', val:fmt(d.z) },
      ];
      labels.forEach((hs, idx) => {
        const div = document.createElement('div');
        div.slot = `hotspot-${idx}`;
        div.className = 'hotspot';
        div.dataset.position = hs.pos;
        div.dataset.normal   = hs.norm;
        div.innerHTML = `<span class="hotspot-icon">${hs.icon}</span><span class="hotspot-label">${hs.label}</span><span class="hotspot-val">${hs.val}</span>`;
        viewer.appendChild(div);
      });
      const hx = d.x/2, hy = d.y/2, hz = d.z/2;
      const corners = [
        [c.x-hx, c.y-hy, c.z-hz], [c.x+hx, c.y-hy, c.z-hz],
        [c.x-hx, c.y+hy, c.z-hz], [c.x+hx, c.y+hy, c.z-hz],
        [c.x-hx, c.y-hy, c.z+hz], [c.x+hx, c.y-hy, c.z+hz],
        [c.x-hx, c.y+hy, c.z+hz], [c.x+hx, c.y+hy, c.z+hz],
      ];
      const cnorms = [
        '-0.577 -0.577 -0.577','0.577 -0.577 -0.577',
        '-0.577 0.577 -0.577', '0.577 0.577 -0.577',
        '-0.577 -0.577 0.577', '0.577 -0.577 0.577',
        '-0.577 0.577 0.577',  '0.577 0.577 0.577',
      ];
      corners.forEach((p, i) => {
        const div = document.createElement('div');
        div.slot = `corner-${i}`;
        div.className = 'corner-dot';
        div.dataset.position = p.join(' ');
        div.dataset.normal   = cnorms[i];
        viewer.appendChild(div);
      });
      startBBoxCanvas();
    }

    function tryGenerate(retries) {
      const d = viewer.getDimensions();
      const c = viewer.getBoundingBoxCenter();
      if (d && d.x > 0 && c) {
        placeHotspots(d, c);
      } else if (retries > 0) {
        setTimeout(() => tryGenerate(retries - 1), 200);
      } else if (item.dims) {
        const p = s => parseFloat(s) || 1;
        const dx = p(item.dims.w), dy = p(item.dims.h), dz = p(item.dims.d);
        placeHotspots({ x:dx, y:dy, z:dz }, { x:0, y:dy/2, z:0 });
      }
    }

    if (viewer.loaded) {
      tryGenerate(6);
    } else {
      viewer.addEventListener('load', () => tryGenerate(6), { once: true });
    }
  }

  viewer.addEventListener('ar-status', (e) => {
    const btn = document.querySelector('.cota-toggle');
    if (e.detail.status === 'session-started') {
      viewer.classList.add('show-cotas');
      if (btn) btn.classList.add('active');
    } else if (e.detail.status === 'not-presenting') {
      viewer.classList.remove('show-cotas');
      if (btn) btn.classList.remove('active');
    }
  });

  viewer.addEventListener('error', (e) => {
    modelErrorMsg.textContent = 'Error: ' + (e.detail?.type || 'fallo') + ' — ' + (viewer.src || '');
    modelError.style.display = 'flex';
  });

  viewer.addEventListener('load', () => {
    modelError.style.display = 'none';
    progressFill.style.width = '0%';
    const d = viewer.getDimensions();
    if (d) {
      document.getElementById('dim-w').textContent = d.x.toFixed(2) + 'm';
      document.getElementById('dim-h').textContent = d.y.toFixed(2) + 'm';
      document.getElementById('dim-d').textContent = d.z.toFixed(2) + 'm';
    }
  });

  viewer.addEventListener('progress', (e) => {
    progressFill.style.width = (e.detail.totalProgress * 100) + '%';
  });

  function setViewMode(mode) {
    const photoContainer = document.getElementById('photo-view-container');
    const btn3d   = document.getElementById('btn-view-3d');
    const btnPhoto= document.getElementById('btn-view-photo');
    const cotaBtn = document.querySelector('.cota-toggle');
    if (mode === '3d') {
      btn3d.classList.add('active'); btnPhoto.classList.remove('active');
      viewer.style.opacity = '1'; viewer.style.pointerEvents = 'auto';
      photoContainer.style.display = 'none';
      if (cotaBtn) cotaBtn.style.display = 'flex';
    } else {
      btn3d.classList.remove('active'); btnPhoto.classList.add('active');
      viewer.style.opacity = '0'; viewer.style.pointerEvents = 'none';
      photoContainer.style.display = 'flex';
      if (cotaBtn) cotaBtn.style.display = 'none';
      const activeThumb = document.querySelector('.thumb-item.active');
      if (activeThumb) {
        const item = catalog.find(c => c.id === activeThumb.dataset.id);
        if (item?.image) document.getElementById('photo-view-img').src = item.image;
      }
    }
  }

  function toggleSpecs() {
    const specsList = document.getElementById('prod-specs');
    const btn = document.querySelector('.specs-toggle-btn');
    const hidden = specsList.style.display === 'none';
    specsList.style.display = hidden ? 'flex' : 'none';
    btn.classList.toggle('active', hidden);
  }

  function updateIosSrcAttribute(item, showCotas) {
    const baseIosSrc = (showCotas && item.iosSrcCotas) ? item.iosSrcCotas : item.iosSrc;
    
    if (!baseIosSrc) {
      // Si no existe un archivo USDZ definido físicamente en el catálogo,
      // removemos ios-src para que model-viewer autogenere el USDZ en el iPhone.
      viewer.removeAttribute('ios-src');
      return;
    }
    
    // Serializar metadatos para el banner de iOS
    const params = new URLSearchParams();
    params.set('title', item.title);
    params.set('brand', item.brand);
    params.set('desc', item.desc);
    if (item.dims) {
      params.set('dimW', item.dims.w);
      params.set('dimH', item.dims.h);
      params.set('dimD', item.dims.d);
    }
    if (item.dwg) params.set('dwg', item.dwg);
    if (item.skp) params.set('skp', item.skp);

    if (item.specs) {
      Object.entries(item.specs).forEach(([k, v]) => {
        params.set(k, v);
      });
    }

    const bannerBase = 'https://yoram04.github.io/mobilario-ar-qr-view/ar-banner-v2.html';
    const bannerParams = new URLSearchParams();
    bannerParams.set('title', item.title);
    bannerParams.set('brand', item.brand);
    bannerParams.set('desc', item.desc);
    if (item.dims) {
      bannerParams.set('dimW', item.dims.w);
      bannerParams.set('dimH', item.dims.h);
      bannerParams.set('dimD', item.dims.d);
    }
    if (item.dwg) bannerParams.set('dwg', item.dwg);
    if (item.skp) bannerParams.set('skp', item.skp);
    if (item.specs) Object.entries(item.specs).forEach(([k, v]) => bannerParams.set(k, v));
    
    // Evitar que Safari guarde el banner viejo en caché
    bannerParams.set('v', Date.now());

    const bannerUrl = `${bannerBase}?${bannerParams.toString()}`;
    const finalIosSrc = `${baseIosSrc}#custom=${encodeURIComponent(bannerUrl)}&customHeight=large`;
    viewer.setAttribute('ios-src', finalIosSrc);
  }

  function loadModel(id) {
    currentActiveId = id;
    setViewMode('3d');
    const item = catalog.find(c => c.id === id);
    if (!item) return;

    modelError.style.display = 'none';
    progressFill.style.width = '0%';
    document.getElementById('prod-title').textContent = item.title;
    document.getElementById('prod-brand').textContent = item.brand;
    document.getElementById('prod-desc').textContent  = item.desc;
    document.getElementById('dim-w').textContent = item.dims.w;
    document.getElementById('dim-h').textContent = item.dims.h;
    document.getElementById('dim-d').textContent = item.dims.d;

    viewer.querySelectorAll('[slot^="hotspot-"]').forEach(el => el.remove());

    const dwgBtn = document.getElementById('btn-dwg');
    const skpBtn = document.getElementById('btn-skp');
    if (item.dwg && item.dwg !== '#') { dwgBtn.href = item.dwg; dwgBtn.style.pointerEvents='auto'; dwgBtn.style.opacity='1'; }
    else { dwgBtn.removeAttribute('href'); dwgBtn.style.pointerEvents='none'; dwgBtn.style.opacity='0.45'; }
    if (item.skp && item.skp !== '#') { skpBtn.href = item.skp; skpBtn.style.pointerEvents='auto'; skpBtn.style.opacity='1'; }
    else { skpBtn.removeAttribute('href'); skpBtn.style.pointerEvents='none'; skpBtn.style.opacity='0.45'; }

    if (item.image) {
      viewer.setAttribute('poster', item.image);
      document.getElementById('btn-view-photo').style.display = 'flex';
    } else {
      viewer.removeAttribute('poster');
      document.getElementById('btn-view-photo').style.display = 'none';
    }

    const specsWrapper   = document.getElementById('specs-wrapper');
    const specsContainer = document.getElementById('prod-specs');
    const toggleBtn      = document.querySelector('.specs-toggle-btn');
    specsContainer.innerHTML = '';
    specsContainer.style.display = 'none';
    if (toggleBtn) toggleBtn.classList.remove('active');

    if (item.specs) {
      specsWrapper.style.display = 'block';
      Object.entries(item.specs).forEach(([key, val]) => {
        const row = document.createElement('div');
        row.className = 'spec-row';
        row.innerHTML = `<span class="spec-key">${key.charAt(0).toUpperCase()+key.slice(1)}</span><span class="spec-val">${val}</span>`;
        specsContainer.appendChild(row);
      });
    } else {
      specsWrapper.style.display = 'none';
    }

    buildHotspots(item);
    const showCotas = viewer.classList.contains('show-cotas');
    viewer.setAttribute('src', (showCotas && item.srcCotas) ? item.srcCotas : item.src);
    updateIosSrcAttribute(item, showCotas);
    document.querySelectorAll('.thumb-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  }

  function toggleCotas(btn) {
    const active = btn.classList.toggle('active');
    viewer.classList.toggle('show-cotas', active);
    
    if (currentActiveId) {
      const item = catalog.find(x => x.id === currentActiveId);
      if (item) {
        const newSrc = (active && item.srcCotas) ? item.srcCotas : item.src;
        
        if (viewer.getAttribute('src') !== newSrc) {
          // Efecto de transición fluida (Glass blur crossfade)
          viewer.style.transition = 'opacity 0.3s ease, filter 0.3s ease';
          viewer.style.opacity = '0.3';
          viewer.style.filter = 'blur(10px)';
          
          const onSwapLoad = () => {
             viewer.style.opacity = '1';
             viewer.style.filter = 'blur(0)';
             viewer.removeEventListener('load', onSwapLoad);
          };
          viewer.addEventListener('load', onSwapLoad);
          
          viewer.setAttribute('src', newSrc);
        }
        updateIosSrcAttribute(item, active);
      }
    }
  }

  function openViewer(id) {
    const run = () => {
      loadModel(id);
      document.getElementById('catalog-screen').classList.remove('active');
      document.getElementById('viewer-screen').classList.add('active');
    };
    if (document.startViewTransition) document.startViewTransition(run);
    else run();
  }

  function showCatalog() {
    if (bboxRafId) { cancelAnimationFrame(bboxRafId); bboxRafId = null; }
    const run = () => {
      document.getElementById('viewer-screen').classList.remove('active');
      document.getElementById('catalog-screen').classList.add('active');
    };
    if (document.startViewTransition) document.startViewTransition(run);
    else run();
  }

  let currentSearchQuery = '';

  function handleSearch(query) {
    currentSearchQuery = query.toLowerCase().trim();
    applyFilters();
  }

  function applyFilters() {
    const filtered = catalog.filter(item => {
      return item.title.toLowerCase().includes(currentSearchQuery) || 
             item.desc.toLowerCase().includes(currentSearchQuery);
    });
    renderCatalogGrid(filtered);
  }

  function renderCatalogGrid(items) {
    catalogGrid.innerHTML = '';
    items.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'catalog-card';
      card.style.setProperty('--delay', index);
      card.onclick = () => openViewer(item.id);

      const imageHtml = item.image
        ? `<img src="${item.image}" alt="${item.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const svgHtml = thumbSVGs[item.id] || thumbSVGs['astronauta'];

      card.innerHTML = `
        <div class="catalog-card-image">
          ${imageHtml}
          <div style="display:${item.image ? 'none' : 'flex'};align-items:center;justify-content:center;width:100%;height:100%">${svgHtml}</div>
          <div class="catalog-card-badge">${item.brand.split('·')[1].trim()}</div>
        </div>
        <div class="catalog-card-info">
          <h3 class="catalog-card-title">${item.title}</h3>
          <p class="catalog-card-desc">${item.desc}</p>
        </div>
        <div class="catalog-card-footer">
          <span class="catalog-card-dims">${item.dims.w.replace('m','')} × ${item.dims.h.replace('m','')} × ${item.dims.d.replace('m','')} m</span>
          <button class="catalog-card-btn">
            Ver en 3D
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      `;
      catalogGrid.appendChild(card);
    });
  }

  function shareProduct() {
    if (!currentActiveId) return;
    const item = catalog.find(x => x.id === currentActiveId);
    if (!item) return;

    if (navigator.share) {
      navigator.share({
        title: item.title,
        text: `Mira este modelo 3D en Realidad Aumentada: ${item.title} (${item.brand})`,
        url: window.location.origin + '?id=' + item.id
      }).catch(err => console.log('Error compartiendo:', err));
    } else {
      const tempUrl = window.location.origin + '?id=' + item.id;
      navigator.clipboard.writeText(tempUrl).then(() => {
        showToast('Enlace copiado al portapapeles');
      });
    }
  }

  function showToast(message) {
    let toast = document.getElementById('app-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'app-toast';
      toast.style.cssText = `
        position: fixed;
        top: calc(env(safe-area-inset-top,20px) + 12px);
        left: 50%;
        transform: translate(-50%, -32px);
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(255, 140, 60, 0.3);
        box-shadow: 0 8px 30px rgba(255, 140, 60, 0.12);
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--text);
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
      `;
      document.body.appendChild(toast);
    }
    toast.textContent = message;
    setTimeout(() => {
      toast.style.opacity = '1';
      toast.style.transform = 'translate(-50%, 0)';
    }, 50);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translate(-50%, -32px)';
    }, 2500);
  }

  // Render initial catalog grid
  renderCatalogGrid(catalog);

  // Build thumbnails (constant)
  catalog.forEach(item => {
    const svgHtml = thumbSVGs[item.id] || thumbSVGs['astronauta'];
    const thumb = document.createElement('div');
    thumb.className = 'thumb-item';
    thumb.dataset.id = item.id;
    const thumbHtml = item.image
      ? `<img src="${item.image}" alt="${item.title}">`
      : svgHtml;
    thumb.innerHTML = thumbHtml;
    thumb.title = item.title;
    thumb.onclick = () => loadModel(item.id);
    thumbsContainer.appendChild(thumb);
  });
</script>
</body>
</html>
